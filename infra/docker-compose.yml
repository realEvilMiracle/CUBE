version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photos_db}
      POSTGRES_USER: ${POSTGRES_USER:-photos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photos_user} -d ${POSTGRES_DB:-photos_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_MEDIA_ROOT: /app/media
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-api-key-change-me}

      POSTGRES_DB: ${POSTGRES_DB:-photos_db}
      POSTGRES_USER: ${POSTGRES_USER:-photos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photos_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

      PHOTO_MAX_UPLOAD_BYTES: ${PHOTO_MAX_UPLOAD_BYTES:-20971520}
      PHOTO_ALLOWED_MIME_TYPES: ${PHOTO_ALLOWED_MIME_TYPES:-image/jpeg,image/jpg,image/png,image/webp}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    ports:
      - ${BACKEND_PORT:-8000}:8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/reports/summary/').read()\""
        ]
      interval: 20s
      timeout: 10s
      retries: 6

  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-api-key-change-me}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:

